# DaktariTB MCP — Render.com Blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# To deploy:
#   1. Push this file to GitHub
#   2. In Render dashboard: New > Blueprint > connect this repo
#   3. Render reads render.yaml and creates the service
#
# To change config: edit this file, push, Render auto-applies.

services:
  - type: web
    name: daktaritb-mcp
    runtime: docker
    region: frankfurt          # Closest to Nairobi among Render's regions
    plan: free                 # 750 hours/month, spins down after 15min idle
    branch: main
    dockerfilePath: ./Dockerfile

    # Render hits this path every 30s. If it 200s, service is healthy.
    healthCheckPath: /healthz

    envVars:
      - key: LOG_LEVEL
        value: info
      - key: DEBUG_LOG_REQUESTS
        value: "false"

      # --- Kenya MOH facility identity (demo values for hackathon) ---
      # Code 99001 is intentionally outside the real KMFL range (10000-50000+)
      # to clearly signal this is a demo facility, not a registered one.
      # In production, override these via Render dashboard per-facility.
      - key: MOH_FACILITY_CODE
        value: "99001"
      - key: MOH_FACILITY_NAME
        value: "Jamii Health Demo Clinic - Nairobi"
